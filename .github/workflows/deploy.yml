name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.0'

      - name: Install dependencies
        run: yarn

      - name: Build WASM
        run: yarn make-wasm

      - name: Build web app
        run: yarn build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public/ --project-name=kombu
```

然后：

1. 在 Cloudflare Dashboard 获取 **Account ID**（首页右侧）
2. 创建 **API Token**：我的个人资料 → API 令牌 → 创建令牌 → 选择 "Cloudflare Pages" 模板
3. 在 GitHub 仓库的 **Settings → Secrets and variables → Actions** 中添加两个 Secret：
   - `CLOUDFLARE_API_TOKEN`
   - `CLOUDFLARE_ACCOUNT_ID`

---

## 注意事项

| 问题 | 说明 |
|------|------|
| **WASM MIME 类型** | Cloudflare Pages 默认正确处理 `.wasm` 文件的 `application/wasm` MIME 类型，无需额外配置。 |
| **文件大小** | Free 计划单个文件上限 25MB。`ffi.wasm` 通常几十到几百 KB，不会有问题。 |
| **自定义域名** | 在 Pages 项目的"自定义域"中绑定你自己的域名，自动配 HTTPS。 |
| **缓存策略** | HTML 和 WASM 文件建议设较短的缓存时间（更新频繁），JS/CSS 可以长缓存（文件名带 hash）。默认策略已足够。 |

## 如果想用 Cloudflare Workers

因为 Kombu 是纯静态应用，用 Workers 反而需要自己处理静态文件路由，不如 Pages 方便。如果你仍想用 Workers 部署，本质上就是用 Workers 的 Static Assets 功能，或者用 `wrangler deploy` 部署一个简单的静态站点 Worker。但 Pages 是更合适的选择。

