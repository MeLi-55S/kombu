<body>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js');
      });
    }
  </script>

  <header>
    <div class="header-top-bar">
      <select id="lang-toggle" class="lang-toggle" title="切换语言 / Switch language">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="pt">Português</option>
        <option value="ko">한국어</option>
      </select>
    </div>
    <h1><a href="#">MeLi Kombu</a></h1>
    <div class="subtitle" id="subtitle-text">
      在 TTF / OTF / WOFF / WOFF2 之间互相转换字体，全程在浏览器本地完成，无需上传。
    </div>
  </header>

  <main class="container">
    <div id="input-select-zone">
      <div>
        <input id="input-file" type="file" style="display:none" multiple accept=".ttf,.otf,.woff,.woff2">
        <button id="select-file-button">
          <svg class="dropzone-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/>
            <path d="M12 11l-4 4h3v4h2v-4h3l-4-4z" fill="currentColor"/>
          </svg>
          <span class="dropzone-label">选择字体文件或将文件拖拽到这里</span>
          <span class="dropzone-hint">支持 .ttf、.otf、.woff、.woff2 — 可一次选择多个文件</span>
        </button>
      </div>
    </div>

    <div id="selected-font-info"></div>

    <div id="format-select-container">
      <input type="radio" class="input-radio" id="output-format-otf" name="output-format" value="otf">
      <label for="output-format-otf">TTF / OTF</label>
      <input type="radio" class="input-radio" id="output-format-woff" name="output-format" value="woff">
      <label for="output-format-woff">WOFF</label>
      <input type="radio" class="input-radio" id="output-format-woff2" name="output-format" value="woff2" checked>
      <label for="output-format-woff2">WOFF2</label>
    </div>

    <div id="convert-button-container">
      <button id="convert-button">开始转换</button>
    </div>

    <div id="spinner" class="spinner-off">
      <div style="display: flex; align-items: center">
        <span id="spinner-text">正在转换</span>
        <svg version="1.1" id="spinner-icon" xmlns="http://www.w3.org/2000/svg"
          xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" width="24px" height="24px" viewBox="0 0 24 24"
          style="enable-background:new 0 0 50 50;" xml:space="preserve" aria-hidden="true">
          <rect x="0" y="2" width="4" height="18">
            <animate attributeName="opacity" attributeType="XML" values="1; .2; 1" begin="0s" dur="2s"
              repeatCount="indefinite" />
          </rect>
          <rect x="7" y="2" width="4" height="18">
            <animate attributeName="opacity" attributeType="XML" values="1; .2; 1" begin="0.6s" dur="2s"
              repeatCount="indefinite" />
          </rect>
          <rect x="14" y="2" width="4" height="18">
            <animate attributeName="opacity" attributeType="XML" values="1; .2; 1" begin="1.2s" dur="2s"
              repeatCount="indefinite" />
          </rect>
        </svg>
      </div>

      <div id="spinner-hint">如果转换的字体文件较大，可能需要几分钟时间。</div>
    </div>
    <div id="convert-result-container"></div>
    <div id="download-all-container">
      <button id="download-all-button" class="download-all-off">全部打包下载 (ZIP)</button>
    </div>
    <div id="error-message-container" class="error-message-off"></div>
  </main>
